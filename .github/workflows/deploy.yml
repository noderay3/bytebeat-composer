name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

# Serialize deploys so a fast push (or workflow_dispatch on top of a
# push) doesn't race two uploads to the same project.
concurrency:
  group: cf-pages-bytebeat-composer
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Static-only deploy dir. Exclude source / build config / PHP
      # shims / READMEs / .git so Cloudflare only uploads what the
      # browser actually needs. The committed build/ is shipped as-is;
      # if you change src/ locally, run `npm start` and commit the new
      # build/ before pushing.
      - name: Build deploy dir
        run: |
          mkdir -p _deploy
          rsync -a \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=src \
            --exclude=scripts \
            --exclude='package*.json' \
            --exclude=rollup.config.mjs \
            --exclude=eslint.config.mjs \
            --exclude='*.md' \
            --exclude='LICENSE*' \
            --exclude=bytebeat.php \
            --exclude='settings*.php' \
            --exclude=.htaccess \
            --exclude=_deploy \
            ./ _deploy/
          du -sh _deploy

      # Direct `npx wrangler` (not cloudflare/wrangler-action) — the
      # action does extra account-listing auth checks that need broader
      # scope. Plain wrangler is happy with Pages:Edit alone.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy _deploy \
            --project-name=bytebeat-composer \
            --branch=main \
            --commit-dirty=true
