name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Static-only deploy dir. We exclude source / build config /
      # PHP shims / READMEs / .git so Cloudflare only sees what the
      # browser actually needs. The committed build/ is shipped as-is;
      # if you change src/ locally, run `npm start` and commit the new
      # build/ before pushing.
      - name: Build deploy dir
        run: |
          mkdir -p _deploy
          rsync -a \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=src \
            --exclude=scripts \
            --exclude='package*.json' \
            --exclude=rollup.config.mjs \
            --exclude=eslint.config.mjs \
            --exclude='*.md' \
            --exclude='LICENSE*' \
            --exclude=bytebeat.php \
            --exclude='settings*.php' \
            --exclude=.htaccess \
            --exclude=_deploy \
            ./ _deploy/
          du -sh _deploy

      # Skip cloudflare/wrangler-action: its account-listing check needs
      # broader scope than our minimal Pages:Edit token. npx wrangler
      # directly works fine with just that permission (this is the same
      # command we run for manual deploys).
      - name: Sanity-check secrets (length + prefix only, never the secret itself)
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          A: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "token length: ${#T} (expect 53)"
          echo "token prefix: ${T:0:8} (expect cfat_37Y)"
          echo "account length: ${#A} (expect 32)"
          echo "account prefix: ${A:0:6} (expect d2853f)"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy _deploy \
            --project-name=bytebeat-composer \
            --branch=main \
            --commit-dirty=true
